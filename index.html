<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Security Claim Calculator</title>
    <!-- Set the theme before first paint to avoid a flash of the wrong theme.
         Mirrors the resolution order in src/hooks/useTheme.js (stored choice,
         else OS preference). Keep THEME_STORAGE_KEY ("ssc-theme") in sync. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("ssc-theme");
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : window.matchMedia &&
                window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
